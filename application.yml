custom:
  message: Setting from config server git repository馃殌
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:9000/eureka/
  instance:
#    hostname: localhost // can cause issues in some environments, so it's often better to use prefer-ip-address
    prefer-ip-address: true


# spring actuator
management:
    endpoints:
      web:
        exposure:
          include: refresh,health,info

    
